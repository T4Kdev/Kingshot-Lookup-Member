const fmt = (n) => {
if (!n) return “—”;
if (n >= 1e9) return (n / 1e9).toFixed(2) + “B”;
if (n >= 1e6) return (n / 1e6).toFixed(1) + “M”;
if (n >= 1e3) return (n / 1e3).toFixed(0) + “K”;
return String(n);
};
const fmtFull = (n) => n ? n.toLocaleString() : “—”;
const parseNum = (s) => parseInt((s || “”).replace(/,/g, “”)) || 0;

/* ─────────────────────────────────────────────────────
PLAYER TABLE
───────────────────────────────────────────────────── */
function PlayerTable({ players, onRemove }) {
const [sortKey, setSortKey] = useState(“power”);
const [sortDir, setSortDir] = useState(-1);
const [search,  setSearch]  = useState(””);

const sorted = useMemo(() => {
const f = players.filter(p =>
p.name.toLowerCase().includes(search.toLowerCase()) ||
p.fid.includes(search) ||
p.kingdom.toLowerCase().includes(search.toLowerCase())
);
return […f].sort((a, b) => sortDir * (a[sortKey] > b[sortKey] ? 1 : -1));
}, [players, sortKey, sortDir, search]);

const handleSort = (key) => {
if (key === sortKey) setSortDir(d => -d);
else { setSortKey(key); setSortDir(-1); }
};
const arrow  = (k) => sortKey === k ? (sortDir < 0 ? “ ↓” : “ ↑”) : “”;
const maxPow = Math.max(…players.map(p => p.power), 1);
const totPow = players.reduce((s, p) => s + p.power, 0);
const cellB  = { borderBottom: `1px solid ${C.border}22` };

const thS = (k, align = “right”) => ({
padding: “8px 12px”, fontFamily: “Cinzel, serif”, fontSize: 10,
letterSpacing: “0.14em”, textTransform: “uppercase”,
color: sortKey === k ? C.gold : C.muted,
cursor: k ? “pointer” : “default”, userSelect: “none”,
borderBottom: `1px solid ${C.border}`, textAlign: align,
});

return (
<div style={{ display: “flex”, flexDirection: “column”, gap: 10 }}>
<input
value={search} onChange={e => setSearch(e.target.value)}
placeholder=“Search by name, FID, or kingdom…”
style={inp({ borderRadius: 2 })}
/>
<div style={{ overflowX: “auto” }}>
<table style={{ width: “100%”, borderCollapse: “collapse” }}>
<thead>
<tr>
<th style={thS(“name”, “left”)} onClick={() => handleSort(“name”)}>Governor{arrow(“name”)}</th>
<th style={thS(“power”)}        onClick={() => handleSort(“power”)}>Power{arrow(“power”)}</th>
<th style={thS(“kills”)}        onClick={() => handleSort(“kills”)}>Kills{arrow(“kills”)}</th>
<th style={thS(“troops”)}       onClick={() => handleSort(“troops”)}>Troops{arrow(“troops”)}</th>
<th style={thS(null, “center”)}>Share</th>
<th style={thS(null)} />
</tr>
</thead>
<tbody>
{sorted.map((p, i) => {
const share = totPow > 0 ? ((p.power / totPow) * 100).toFixed(1) : “0.0”;
const barW  = Math.round((p.power / maxPow) * 100);
return (
<tr key={p.id} style={{ background: i % 2 === 0 ? “transparent” : “rgba(255,255,255,0.012)” }}>
<td style={{ padding: “10px 12px”, …cellB }}>
<div style={{ display: “flex”, alignItems: “center”, gap: 10 }}>
<Avatar name={p.name} profilePhoto={p.profilePhoto} size={34} />
<div>
<div style={{ color: C.text, fontFamily: “Cinzel, serif”, fontSize: 13 }}>{p.name}</div>
<div style={{ color: C.muted, fontSize: 11 }}>FID {p.fid} · {p.kingdom}{p.level ? ` · Lv ${p.level}` : “”}</div>
</div>
</div>
</td>
<td style={{ padding: “10px 12px”, textAlign: “right”, …cellB }}>
<div style={{ color: C.gold, fontFamily: “Cinzel, serif”, fontSize: 13 }}>{fmt(p.power)}</div>
<div style={{ marginTop: 4, height: 3, background: C.border, borderRadius: 2, width: 80, marginLeft: “auto” }}>
<div style={{ height: “100%”, width: `${barW}%`, background: C.gold, borderRadius: 2 }} />
</div>
</td>
<td style={{ padding: “10px 12px”, textAlign: “right”, color: C.text, fontSize: 14, …cellB }}>{fmt(p.kills)}</td>
<td style={{ padding: “10px 12px”, textAlign: “right”, color: C.text, fontSize: 14, …cellB }}>{fmt(p.troops)}</td>
<td style={{ padding: “10px 12px”, textAlign: “center”, color: C.accent, fontFamily: “Cinzel, serif”, fontSize: 12, …cellB }}>{share}%</td>
<td style={{ padding: “10px 8px”, …cellB }}>
<button onClick={() => onRemove(p.id)} style={{
background: “none”, border: `1px solid ${C.red}55`, color: C.red,
padding: “2px 8px”, fontFamily: “Cinzel, serif”, fontSize: 11,
}}>✕</button>
</td>
</tr>
);
})}
</tbody>
</table>
{sorted.length === 0 && (
<div style={{ textAlign: “center”, color: C.muted, padding: “32px 0”, fontSize: 15 }}>No governors found.</div>
)}
</div>
</div>
);
}

function AddPlayerForm({ onAdd }) {
const empty = { fid: “”, name: “”, kingdom: “”, level: “”, power: “”, kills: “”, troops: “”, profilePhoto: null };
const [form, setForm]               = useState(empty);
const [open, setOpen]               = useState(false);
const [lookupState, setLookupState] = useState(“idle”);

const set = (k) => (e) => { setForm(f => ({ …f, [k]: e.target.value })); if (k === “fid”) setLookupState(“idle”); };

const doLookup = useCallback(async () => {
if (form.fid.trim().length < 4) return;
setLookupState(“loading”);
const r = await lookupPlayer(form.fid);
if (!r)      { setLookupState(“idle”); return; }
if (r.error) { setLookupState(r.error); return; }
setForm(f => ({ …f, name: r.name || f.name, kingdom: r.kingdom || f.kingdom, level: r.level != null ? String(r.level) : f.level, profilePhoto: r.profilePhoto || null }));
setLookupState(“found”);
}, [form.fid]);

const submit = () => {
if (!form.name || !form.fid) return;
onAdd({ id: Date.now(), name: form.name.trim(), fid: form.fid.trim(), kingdom: form.kingdom || “K??”, level: parseInt(form.level) || null, power: parseNum(form.power), kills: parseNum(form.kills), troops: parseNum(form.troops), profilePhoto: form.profilePhoto });
setForm(empty); setLookupState(“idle”); setOpen(false);
};

const fidBorder = lookupState === “found” ? C.green : (lookupState === “not_found” || lookupState === “network_error”) ? C.red : C.border;

return (
<div style={{ borderTop: `1px solid ${C.border}`, paddingTop: 16 }}>
<button onClick={() => { setOpen(o => !o); setForm(empty); setLookupState(“idle”); }}
style={{ background: open ? C.card : “transparent”, border: `1px solid ${C.goldDim}`, color: C.gold, padding: “8px 20px”, fontFamily: “Cinzel, serif”, fontSize: 12, letterSpacing: “0.14em”, display: “flex”, alignItems: “center”, gap: 8 }}>
<span style={{ fontSize: 16 }}>{open ? “−” : “+”}</span>{open ? “Cancel” : “Enlist Governor”}
</button>

const LineTooltip = ({ active, payload, label }) => {
if (!active || !payload?.length) return null;
return <div style={{ background: C.card, border: `1px solid ${C.border}`, padding: “8px 14px” }}>
<div style={{ color: C.muted, fontSize: 10, fontFamily: “Cinzel, serif” }}>{label}</div>
<div style={{ color: C.gold, fontFamily: “Cinzel, serif”, fontSize: 15 }}>{payload[0].value}M</div>

  </div>;
};
const BarTooltip = ({ active, payload }) => {
  if (!active || !payload?.length) return null;
  return <div style={{ background: C.card, border: `1px solid ${C.border}`, padding: "8px 14px" }}>
    <div style={{ color: C.text, fontSize: 13 }}>{payload[0].payload.name}</div>
    <div style={{ color: C.gold, fontFamily: "Cinzel, serif", fontSize: 14 }}>{fmt(payload[0].value)}</div>
  </div>;
};
